# See https://wiki.hypr.land/Configuring/Monitors/
# monitor=,preferred,auto,auto,

# monitor HDMI-A-1,1920x1080@144,0x0,1
# monitor = $2k

# bind = SUPER, F8, exec, hyprctl keyword 'monitorv2[HDMI-A-1]:mode' '3840x2560@165'
# bind = SUPER, F8, exec, hyprctl keyword $4k_mode
# bind = SUPER, F9, exec, hyprctl keyword $2k_mode

# to change a property below dynamically (EG: sunshine)
# hyprctl keyword 'monitorv2[HDMI-A-1]:scale' 2

# to undo, simply: hyprctl reload

monitorv2 {
    output = $mainMonitor
    # output = HDMI-A-1
    mode = 3840x2160@165
    # mode = 2560x1440@165
    position = 0x0

    # vrr values
    # flag | mode 
    # 0    | off
    # 1    | on
    # 2    | fullscreen
    # 3    | tag +video/+game
    # vrr = 3

    # scale of 1 is fine for 55"
    scale = 1

    ### hdr settings
    bitdepth = 10
    # wiki says `hdredid`
    cm = hdredid

    # 0 = auto
    supports_hdr = 0
    supports_wide_color = 0

    min_luminance = 0.002
    max_luminance = 1000
    sdr_max_luminance = 200
    sdr_min_luminance = 0.05
    sdrbrightness = 1.0
    sdrsaturation = 1.0
}


# render: keep_unmodified_copy = 1
# keep_unmodified_copy
render {
    # 2 - low latency with content type 'game'
    # 1 - on if fullscreen
    direct_scanout = 2

    cm_sdr_eotf = srgb
    non_shader_cm = 0

    # not sure what this does
    # send_content_type = true

    # on git, allow screen sharing to show
    # unmodified sdr image
    # keep_unmodified_copy = 2
}
