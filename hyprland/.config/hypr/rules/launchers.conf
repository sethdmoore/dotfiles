# netmarble / mongil launcher
windowrule {
    name = mongil-launcher
    match:title = ^Netmarble\ Launcher$
    size = 1280 810
    float = on
    center = on
}

windowrule {
    name = launcher
    match:initial_title = ^NTE$
    match:initial_class = steam_app_-1
    size = 1280 720
    float = on
    center = on
}


windowrule {
    name = untag-installer
    match:initial_class = ^(?i).*(steam_app_0|install).*$
    suppress_event = fullscreen maximize fullscreenoutput
    keep_aspect_ratio = on

    size = 1920 1080
    float = on
}

