# weechat needs screen-like TERM var
# set -g default-terminal "screen-256color" - 2023-07-27
set -g default-terminal "tmux-256color"

source-file "${HOME}/.config/tmux/palette.conf"

#########################
# cross platform compat #
#########################

if-shell "uname -s | grep -iq darwin" \
  "bind -Tcopy-mode-vi y send -X copy-pipe pbcopy"

if-shell "uname -s | grep -iq linux" \
  'bind -Tcopy-mode-vi y send -X copy-pipe "xclip -i -sel p -f | xclip -i -sel c"'

# Windows/WSL: allow copy, override above as we're still in a "linux" kernel
if-shell "uname -r | grep -iq microsoft" \
  'bind -Tcopy-mode-vi y send -X copy-pipe "/mnt/c/Windows/System32/clip.exe"'

# Prevent OSX path_helper from scrambling our PATH
# This forces tmux to use non-login shells (thus avoiding re-sourcing /etc/profile)
# Fixes macports PATH as well
set -g default-command "${SHELL}"

# set tmux path for helper bins
# set-environment -g to "${HOME}/bin/tmux"
# inject our scripts into PATH for imports and other things
set-environment -g PATH "${HOME}/.local/bin/tmux:${PATH}"

set-environment -g PREFIX_TIMEOUT "10"

set-option -g history-limit 2000000
set-option -g repeat-time  600
# set-option -g escape-time "${PREFIX_TIMEOUT}"

#########################
#     sane defaults     #
#########################
# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# 1 second on prefix
set -sg escape-time 1

# mouse mode is actually really sweet
set -ag mouse

# true color support
# set-option -gas terminal-overrides "*:RGB"
set -gas terminal-features "alacritty:RGB:usstyle"
# undercurl support
# set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
# underscore colors
# set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# is there really any other mode?
set-option -g status-keys vi
set-window-option -g mode-keys vi

set -g monitor-bell on
set -g visual-bell off

#########################
#     sane bindings     #
#########################
unbind C-b
# the clock is cool, but not that cool
unbind t
# regular ol' choose-tree is beautiful
bind-key t choose-tree

# unbind choose-tree bindings
## don't need 8 ways to skin a cat

# by default it's zoomed (-Z)
# -s starts with sessions collapsed
unbind w  # :list-keys: choose-tree -Zs
# -w starts with windows collapsed
unbind s  # :list-keys: choose-tree -Zw

# nasty template logic, but it allows for interpolation
%if "#{==:$SSH_CLIENT,}"
  # set the prefix for local sessions
  set -g prefix `
  bind-key ` send-prefix
%else
  # set prefix to f1 for ssh
  set -g prefix f1
  bind-key f1 send-prefix
  set -g pane-border-status bottom
%endif


bind-key E setw synchronize-panes \
  \; display-message "Synchronize panes #{?pane_synchronized,on,off}"
bind-key m clear-history \
  \; display-message "History Cleared"


bind-key \\ split-window -h -c "#{pane_current_path}"
bind-key - split-window -c "#{pane_current_path}"

bind-key % split-window -h -c "#{pane_current_path}"
bind-key '"' split-window -c "#{pane_current_path}"

bind-key R source $XDG_CONFIG_HOME/tmux/tmux.conf \; display-message "Config Reloaded"

bind Q list-sessions
bind N new-session

bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# don't really care what number a pane is
# so rebind it to prefix-^
unbind q
bind \^ display-panes

bind q select-pane -d \
  \; set -pF window-style "#{@input_off}" \
  \; set -pF window-active-style "#{@w_active_style_off}"
bind e select-pane -e \
  \; set -pF window-style "#{@window_style}" \
  \; set -pF window-active-style "#{@w_active_style}"

bind -r n next-window
bind -r p previous-window

unbind \{
unbind \}
bind -r \{ swap-pane -U
bind -r \} swap-pane -D

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

set -g display-panes-time 3000


#########################
#     sane theming      #
#########################
%if "#{==:$SSH_CLIENT,}"
set -Fg status-bg "#{@status_bg}"
set -Fg window-active-style "#{@w_active_style}"
set -g status-position top
set -g pane-border-status top
%else
# override statusbg color in an ssh session
set -Fg status-bg "#{@status_bg_ssh}"
set -Fg window-active-style "#{@w_active_style_ssh}"
# set the bar on the bottom
set -g status-position bottom
set -g pane-border-status bottom
%endif

set -g status-style fg=white
set -g status-justify left

set -gF pane-border-style "#{@p_border_style}"
set -gF pane-active-border "#{@p_active_border}"

set -g status-left-length 32
set -g status-right-length 150
set -g status-interval 1

set -g window-style "#{@window_style}"

# use stringbuilding POSIX scripts instead of the mess it was before
set -g status-left '#(status-left)'
set -g status-right "#(status-right)"

set -g window-status-format "#(window-status-format)"
set -g window-status-current-format "#(window-status-current-format)"

set -g window-status-bell bg=default,fg=default
