monitor.alsa.rules = [
  {
    matches = [
      { node.name = "alsa_output.usb-BurrBrown_from_Texas_Instruments_USB_AUDIO_DAC-00.iec958-stereo" }
    ]
    actions = {
      update-props = {
        node.description = "PCM2704C Mixer #3"
        node.nick        = "Discord #3"
      }
    }
  }
  {
    matches = [
      { node.name = "alsa_output.usb-Burr-Brown_from_TI_USB_Audio_DAC-00.iec958-stereo" }
    ]
    actions = {
      update-props = {
        node.description = "PCM2704 Mixer #2"
        node.nick        = "Main #2"
      }
    }
  }
  {
    matches = [
      { node.name = "alsa_output.pci-0000_0e_00.1.hdmi-stereo" }
    ]
    actions = {
      update-props = {
        node.description = "Hisense Sound Bar (HDMI)"
        node.nick        = "Sound Bar"
      }
    }
  }
  {
    matches = [
      { node.name = "alsa_input.usb-Burr-Brown_from_TI_USB_Audio_CODEC-00.analog-mono" }
    ]
    actions = {
      update-props = {
        node.description = "Microphone (PCM2902)"
        node.nick        = "Mic"
      }
    }
  }
]
