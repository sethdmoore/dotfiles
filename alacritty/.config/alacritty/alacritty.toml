general.import = [
  "~/.config/alacritty/option_as_alt.toml",
  "~/.config/alacritty/themes/noctalia.toml"
]

[window]
opacity = 0.5

[font.normal]
family = "Hack Nerd Font Mono"
style = "Regular"

[font.bold]
family = "Hack Nerd Font Mono"
style = "Bold"

[font.bold_italic]
family = "Hack Nerd Font Mono"
style = "Bold Italic"

[font.italic]
family = "Hack Nerd Font Mono"
style = "Italic"
